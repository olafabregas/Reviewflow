version: "3.8"

# ReviewFlow — Production Docker Compose (EC2: reviewflowlms.com, host port 8082)
# NEVER: docker compose down -v  (destroys data volumes)

services:

  mysql:
    image: mysql:8.0
    container_name: reviewflow-mysql-prod
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: reviewflow
      MYSQL_USER: reviewflow
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data_prod:/var/lib/mysql
      - ./init/01_create_db.sql:/docker-entrypoint-initdb.d/01_create_db.sql:ro
      - ./mysql/prod.cnf:/etc/mysql/conf.d/reviewflow.cnf:ro
      - /opt/reviewflow/backups:/backups
    networks:
      - reviewflow-prod
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "reviewflow", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    expose:
      - "3306"
    labels:
      com.reviewflow.environment: prod
      com.reviewflow.service: database

  redis:
    image: redis:7-alpine
    container_name: reviewflow-redis-prod
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 96mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
      --save 900 1
      --save 300 10
      --save 60 10000
    volumes:
      - redis_data_prod:/data
    networks:
      - reviewflow-prod
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    expose:
      - "6379"
    labels:
      com.reviewflow.environment: prod
      com.reviewflow.service: cache

  app:
    image: ${ECR_REGISTRY:-797795454732.dkr.ecr.ca-central-1.amazonaws.com}/reviewflow:prod-latest
    container_name: reviewflow-app-prod
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - /opt/reviewflow/.env
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/reviewflow?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: reviewflow
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.MySQLDialect
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_REDIS_PASSWORD: ${REDIS_PASSWORD}
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: 8081
      JAVA_OPTS: >-
        -Xms256m -Xmx512m -XX:+UseG1GC -XX:MaxGCPauseMillis=200
        -XX:+ExitOnOutOfMemoryError -Djava.security.egd=file:/dev/./urandom
    ports:
      - "8082:8081"
    volumes:
      - /var/log/reviewflow:/var/log/reviewflow
    networks:
      - reviewflow-prod
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    labels:
      com.reviewflow.environment: prod
      com.reviewflow.service: app

networks:
  reviewflow-prod:
    driver: bridge
    name: reviewflow-prod

volumes:
  mysql_data_prod:
    name: reviewflow-mysql-data-prod
  redis_data_prod:
    name: reviewflow-redis-data-prod
