name: CD — Deploy

# Merge to master → build, push to ECR, deploy staging (when EC2 secrets are set).
# Production deploy: workflow_dispatch with environment approval.

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options:
          - staging
          - production
      image_tag:
        description: Image tag to deploy (blank = latest staging image)
        required: false
        type: string

env:
  JAVA_VERSION: '21'
  JAVA_DISTRIBUTION: 'temurin'
  MAVEN_OPTS: '-Xmx1024m'
  AWS_REGION: ca-central-1
  ECR_REPOSITORY: reviewflow

jobs:

  test:
    name: Full Test Suite
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testpassword
          MYSQL_DATABASE: reviewflow_test
          MYSQL_USER: reviewflow
          MYSQL_PASSWORD: testpassword
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -ptestpassword"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: maven
      - name: Install MySQL client
        run: sudo apt-get update && sudo apt-get install -y default-mysql-client
      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -u root -ptestpassword --silent; then
              echo "MySQL ready"
              break
            fi
            sleep 2
          done
      - name: Run full test suite
        run: ./mvnw verify -B -Dspring.profiles.active=test
        env:
          SPRING_DATASOURCE_URL: jdbc:mysql://127.0.0.1:3306/reviewflow_test
          SPRING_DATASOURCE_USERNAME: reviewflow
          SPRING_DATASOURCE_PASSWORD: testpassword
          SPRING_REDIS_HOST: 127.0.0.1
          SPRING_REDIS_PORT: 6379
          SPRING_REDIS_PASSWORD: ""
          HASHIDS_SALT: test-salt-not-real
          JWT_SECRET: test-secret-not-real-must-be-long-enough-for-hmac
          MAIL_FROM: noreply@reviewflowlms.com
          AWS_S3_BUCKET: reviewflow-test-bucket
          AWS_REGION: ca-central-1
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cd-test-results
          path: |
            target/surefire-reports/
            target/site/jacoco/

  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image-uri: ${{ steps.meta.outputs.full-image }}
      image-tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Compute image tag
        id: meta
        run: |
          ECR_REGISTRY=${{ steps.login-ecr.outputs.registry }}
          SHORT_SHA=${GITHUB_SHA::8}
          TAG="staging-${SHORT_SHA}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "registry=${ECR_REGISTRY}" >> $GITHUB_OUTPUT
          echo "full-image=${ECR_REGISTRY}/${{ env.ECR_REPOSITORY }}:${TAG}" >> $GITHUB_OUTPUT
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.full-image }}
            ${{ steps.meta.outputs.registry }}/${{ env.ECR_REPOSITORY }}:staging-latest
          build-args: |
            BUILD_VERSION=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    name: Deploy → Staging
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    environment: staging
    steps:
      - name: Check EC2 is configured
        id: check-ec2
        run: |
          if [ -z "${{ secrets.EC2_HOST_STAGING }}" ]; then
            echo "EC2_HOST_STAGING not set — staging deploy skipped."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
      - name: Configure AWS credentials
        if: steps.check-ec2.outputs.skip == 'false'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: aws-actions/amazon-ecr-login@v2
        if: steps.check-ec2.outputs.skip == 'false'
      - name: Deploy to staging EC2
        if: steps.check-ec2.outputs.skip == 'false'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST_STAGING }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            IMAGE="${{ needs.build-and-push.outputs.image-uri }}"
            aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
              docker login --username AWS --password-stdin $(echo $IMAGE | cut -d'/' -f1)
            docker pull $IMAGE
            docker-compose -f /opt/reviewflow/docker-compose.staging.yml stop app --timeout 30 || true
            sed -i "s|image: .*reviewflow.*:staging.*|image: ${IMAGE}|g" \
              /opt/reviewflow/docker-compose.staging.yml
            docker-compose -f /opt/reviewflow/docker-compose.staging.yml up -d --no-deps app
            sleep 15
            for i in {1..12}; do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
                http://localhost:8081/actuator/health || echo "000")
              if [ "$STATUS" == "200" ]; then
                echo "Health check passed (attempt $i)"
                exit 0
              fi
              echo "Attempt $i: HTTP $STATUS — waiting..."
              sleep 10
            done
            PREV=$(cat /opt/reviewflow/.last-image 2>/dev/null || echo "")
            if [ -n "$PREV" ]; then
              sed -i "s|image: .*reviewflow.*:staging.*|image: ${PREV}|g" \
                /opt/reviewflow/docker-compose.staging.yml
              docker-compose -f /opt/reviewflow/docker-compose.staging.yml up -d --no-deps app
            fi
            exit 1
      - name: Record deployed image for rollback
        if: steps.check-ec2.outputs.skip == 'false'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST_STAGING }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: echo "${{ needs.build-and-push.outputs.image-uri }}" > /opt/reviewflow/.last-image
      - name: Staging smoke test
        if: steps.check-ec2.outputs.skip == 'false'
        run: |
          HEALTH=$(curl -s -o /dev/null -w "%{http_code}" \
            https://staging.reviewflowlms.com/actuator/health || echo "000")
          if [ "$HEALTH" != "200" ]; then
            echo "Staging smoke test FAILED: HTTP $HEALTH"
            exit 1
          fi
          echo "Staging smoke test PASSED"

  deploy-production:
    name: Deploy → Production
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production'
    environment: production
    steps:
      - name: Check EC2 is configured
        id: check-ec2
        run: |
          if [ -z "${{ secrets.EC2_HOST_PROD }}" ]; then
            echo "EC2_HOST_PROD not set — production deploy skipped."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
      - name: Configure AWS credentials
        if: steps.check-ec2.outputs.skip == 'false'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - id: login-ecr
        if: steps.check-ec2.outputs.skip == 'false'
        uses: aws-actions/amazon-ecr-login@v2
      - name: Retag image for production
        if: steps.check-ec2.outputs.skip == 'false'
        run: |
          ECR_REGISTRY=${{ steps.login-ecr.outputs.registry }}
          PROD_TAG="prod-$(date +%Y%m%d)-${GITHUB_SHA::8}"
          docker pull ${ECR_REGISTRY}/${{ env.ECR_REPOSITORY }}:staging-latest
          docker tag ${ECR_REGISTRY}/${{ env.ECR_REPOSITORY }}:staging-latest \
            ${ECR_REGISTRY}/${{ env.ECR_REPOSITORY }}:${PROD_TAG}
          docker tag ${ECR_REGISTRY}/${{ env.ECR_REPOSITORY }}:staging-latest \
            ${ECR_REGISTRY}/${{ env.ECR_REPOSITORY }}:prod-latest
          docker push ${ECR_REGISTRY}/${{ env.ECR_REPOSITORY }}:${PROD_TAG}
          docker push ${ECR_REGISTRY}/${{ env.ECR_REPOSITORY }}:prod-latest
          echo "PROD_IMAGE=${ECR_REGISTRY}/${{ env.ECR_REPOSITORY }}:${PROD_TAG}" >> $GITHUB_ENV
      - name: Deploy to production EC2
        if: steps.check-ec2.outputs.skip == 'false'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST_PROD }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY_PROD }}
          script: |
            set -e
            IMAGE="${{ env.PROD_IMAGE }}"
            aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
              docker login --username AWS --password-stdin $(echo $IMAGE | cut -d'/' -f1)
            docker pull $IMAGE
            docker-compose -f /opt/reviewflow/docker-compose.prod.yml stop app --timeout 30 || true
            sed -i "s|image: .*reviewflow.*:prod.*|image: ${IMAGE}|g" \
              /opt/reviewflow/docker-compose.prod.yml
            docker-compose -f /opt/reviewflow/docker-compose.prod.yml up -d --no-deps app
            sleep 20
            for i in {1..12}; do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
                http://localhost:8082/actuator/health || echo "000")
              if [ "$STATUS" == "200" ]; then
                echo "Production health check passed"
                exit 0
              fi
              sleep 10
            done
            PREV=$(cat /opt/reviewflow/.last-prod-image 2>/dev/null || echo "")
            if [ -n "$PREV" ]; then
              sed -i "s|image: .*reviewflow.*:prod.*|image: ${PREV}|g" \
                /opt/reviewflow/docker-compose.prod.yml
              docker-compose -f /opt/reviewflow/docker-compose.prod.yml up -d --no-deps app
            fi
            exit 1
      - name: Record deployed image for rollback
        if: steps.check-ec2.outputs.skip == 'false'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST_PROD }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY_PROD }}
          script: echo "${{ env.PROD_IMAGE }}" > /opt/reviewflow/.last-prod-image
      - name: Production smoke test
        if: steps.check-ec2.outputs.skip == 'false'
        run: |
          HEALTH=$(curl -s -o /dev/null -w "%{http_code}" \
            https://reviewflowlms.com/actuator/health || echo "000")
          if [ "$HEALTH" != "200" ]; then
            echo "Production smoke test FAILED: HTTP $HEALTH"
            exit 1
          fi
          echo "Production live at reviewflowlms.com"
