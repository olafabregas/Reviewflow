# \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
# APPLICATION
# \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
spring.application.name=reviewflow-backend
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
# DATABASE
# \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
# JPA / HIBERNATE
# \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:false}
spring.jpa.properties.hibernate.jdbc.batch_size=${HIBERNATE_BATCH_SIZE:50}
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.generate_statistics=${HIBERNATE_STATS:false}

# \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
# FLYWAY
# \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
spring.flyway.enabled=true

# \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
# SERVER
# \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
server.port=${SERVER_PORT:8081}

# \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
# JWT
# \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
# JWT_SECRET must be at least 32 bytes (256 bits) for HS256
# Generate: openssl rand -base64 32
jwt.secret=${JWT_SECRET}
jwt.allow-legacy-tokens-without-kid=true
security.jwt.allow-bearer-header=${SECURITY_JWT_ALLOW_BEARER_HEADER:true}
# jwt.keys[0].kid=2026-04
# jwt.keys[0].secret=${JWT_SECRET_2026_04}
# jwt.keys[0].active=true
# jwt.keys[1].kid=2026-01
# jwt.keys[1].secret=${JWT_SECRET_2026_01}
# jwt.keys[1].active=false
jwt.access-expiration-ms=${JWT_ACCESS_EXPIRATION_MS:900000}
jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}
auth.token-version.store=caffeine
jwt.cookie-name=${JWT_COOKIE_NAME:reviewflow_access}
jwt.refresh-cookie-name=${JWT_REFRESH_COOKIE_NAME:reviewflow_refresh}

# Session Lifecycle Hardening
session.token-version.cache-ttl-seconds=${SESSION_TOKEN_VERSION_TTL:30}
session.token-version.cache-max-size=${SESSION_TOKEN_VERSION_MAX_SIZE:50000}
session.token-version.redis-ttl-seconds=${SESSION_TOKEN_VERSION_REDIS_TTL:300}
session.token-version.invalidation-channel=${SESSION_TOKEN_VERSION_INVALIDATION_CHANNEL:token-version-invalidations}
session.absolute-ceiling-hours=${SESSION_ABSOLUTE_CEILING_HOURS:12}
session.idle-timeout-hours=${SESSION_IDLE_TIMEOUT_HOURS:2}

# Redis messaging pub/sub (multi-node WebSocket delivery)
redis.messaging.pubsub.enabled=${REDIS_MESSAGING_PUBSUB_ENABLED:false}

# Phase 3 per-role session policy overrides (-1 disables override and falls back to defaults above)
auth.session.policy.STUDENT.idle-hours=-1
auth.session.policy.STUDENT.absolute-hours=-1
auth.session.policy.STUDENT.access-ttl-minutes=-1
auth.session.policy.STUDENT.refresh-ttl-hours=-1
auth.session.policy.STUDENT.require-fingerprint=false
auth.session.policy.INSTRUCTOR.idle-hours=-1
auth.session.policy.INSTRUCTOR.absolute-hours=-1
auth.session.policy.INSTRUCTOR.access-ttl-minutes=-1
auth.session.policy.INSTRUCTOR.refresh-ttl-hours=-1
auth.session.policy.INSTRUCTOR.require-fingerprint=false
auth.session.policy.ADMIN.idle-hours=-1
auth.session.policy.ADMIN.absolute-hours=-1
auth.session.policy.ADMIN.access-ttl-minutes=-1
auth.session.policy.ADMIN.refresh-ttl-hours=-1
auth.session.policy.ADMIN.require-fingerprint=false
auth.session.policy.SYSTEM_ADMIN.idle-hours=-1
auth.session.policy.SYSTEM_ADMIN.absolute-hours=-1
auth.session.policy.SYSTEM_ADMIN.access-ttl-minutes=-1
auth.session.policy.SYSTEM_ADMIN.refresh-ttl-hours=-1
auth.session.policy.SYSTEM_ADMIN.require-fingerprint=false

# \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
# HASHIDS
# \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
hashids.salt=${HASHIDS_SALT}
hashids.min-length=${HASHIDS_MIN_LENGTH:8}

# \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
# CORS
# \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
# COOKIE
# \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
app.cookie.secure=${COOKIE_SECURE:false}
app.cookie.same-site=${COOKIE_SAME_SITE:Lax}

# \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
# FILE UPLOAD
# \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:25MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:130MB}

# \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
# FILE SECURITY
# \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
security.file.max-archive-entries=${MAX_ARCHIVE_ENTRIES:1000}
security.file.max-archive-uncompressed-size=${MAX_ARCHIVE_UNCOMPRESSED_SIZE:524288000}
security.file.mime-detection-timeout-ms=${MIME_DETECTION_TIMEOUT_MS:2000}

# \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
# RATE LIMITING
# \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
rate-limit.auth.login.limit=${RATE_LIMIT_AUTH_LOGIN_LIMIT:10}
rate-limit.auth.login.window-minutes=${RATE_LIMIT_AUTH_LOGIN_WINDOW_MIN:15}
rate-limit.auth.refresh.ip.limit=${RATE_LIMIT_AUTH_REFRESH_IP_LIMIT:30}
rate-limit.auth.refresh.user.limit=${RATE_LIMIT_AUTH_REFRESH_USER_LIMIT:60}
rate-limit.auth.refresh.window-seconds=${RATE_LIMIT_AUTH_REFRESH_WINDOW_SEC:60}
rate-limit.auth.password-reset.request.ip.limit=${RATE_LIMIT_PWRESET_REQ_IP_LIMIT:5}
rate-limit.auth.password-reset.request.ip.window-hours=${RATE_LIMIT_PWRESET_REQ_IP_WIN:1}
rate-limit.auth.password-reset.email.limit=${RATE_LIMIT_PWRESET_EMAIL_LIMIT:3}
rate-limit.auth.password-reset.email.window-hours=${RATE_LIMIT_PWRESET_EMAIL_WIN:1}
rate-limit.auth.password-reset.confirm.ip.limit=${RATE_LIMIT_PWRESET_CONFIRM_IP_LIMIT:10}
rate-limit.auth.password-reset.confirm.ip.window-minutes=${RATE_LIMIT_PWRESET_CONFIRM_WIN:15}
rate-limit.auth.step-up.limit=${RATE_LIMIT_STEPUP_LIMIT:5}
rate-limit.auth.step-up.window-minutes=${RATE_LIMIT_STEPUP_WIN:15}
rate-limit.auth.jwt-failure.limit=${RATE_LIMIT_JWT_FAIL_LIMIT:20}
rate-limit.auth.jwt-failure.window-seconds=${RATE_LIMIT_JWT_FAIL_WIN:60}
# --- WebSocket ticket issuance ---
rate-limit.auth.ws-ticket.limit=${RATE_LIMIT_WS_TICKET_LIMIT:30}
rate-limit.auth.ws-ticket.window-minutes=${RATE_LIMIT_WS_TICKET_WINDOW_MIN:15}
# --- Upload rate limiting ---
rate-limit.upload.student.limit=${RATE_LIMIT_UPLOAD_STUDENT_LIMIT:10}
rate-limit.upload.instructor.limit=${RATE_LIMIT_UPLOAD_INSTRUCTOR_LIMIT:30}
rate-limit.upload.admin.limit=${RATE_LIMIT_UPLOAD_ADMIN_LIMIT:60}
rate-limit.upload.window-hours=${RATE_LIMIT_UPLOAD_WINDOW_HOURS:1}
rate-limit.messaging.send.limit=${RATE_LIMIT_MSG_SEND_LIMIT:30}
rate-limit.messaging.send.window-seconds=${RATE_LIMIT_MSG_SEND_WIN:60}
rate-limit.messaging.create.limit=${RATE_LIMIT_MSG_CREATE_LIMIT:10}
rate-limit.messaging.create.window-hours=${RATE_LIMIT_MSG_CREATE_WIN:1}
rate-limit.api.public.capacity=${RATE_LIMIT_API_PUBLIC_CAP:20}
rate-limit.api.public.refill-per-minute=${RATE_LIMIT_API_PUBLIC_REFILL:10}
rate-limit.api.read.default.capacity=${RATE_LIMIT_API_READ_DEF_CAP:200}
rate-limit.api.read.default.refill=${RATE_LIMIT_API_READ_DEF_REFILL:100}
rate-limit.api.read.elevated.capacity=${RATE_LIMIT_API_READ_ELV_CAP:400}
rate-limit.api.read.elevated.refill=${RATE_LIMIT_API_READ_ELV_REFILL:200}
rate-limit.api.write.default.capacity=${RATE_LIMIT_API_WRITE_DEF_CAP:60}
rate-limit.api.write.default.refill=${RATE_LIMIT_API_WRITE_DEF_REFILL:30}
rate-limit.api.write.elevated.capacity=${RATE_LIMIT_API_WRITE_ELV_CAP:120}
rate-limit.api.write.elevated.refill=${RATE_LIMIT_API_WRITE_ELV_REFILL:60}
rate-limit.api.export.default.capacity=${RATE_LIMIT_API_EXPORT_DEF_CAP:5}
rate-limit.api.export.default.refill=${RATE_LIMIT_API_EXPORT_DEF_REFILL:2}
rate-limit.api.export.elevated.capacity=${RATE_LIMIT_API_EXPORT_ELV_CAP:10}
rate-limit.api.export.elevated.refill=${RATE_LIMIT_API_EXPORT_ELV_REFILL:5}
