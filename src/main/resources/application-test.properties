# CI / GitHub Actions test profile (MySQL + Redis service containers)
spring.profiles.active=test

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://127.0.0.1:3306/reviewflow_test}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:reviewflow}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:testpassword}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.validate-on-migrate=false

spring.data.redis.host=${SPRING_REDIS_HOST:127.0.0.1}
spring.data.redis.port=${SPRING_REDIS_PORT:6379}
spring.data.redis.password=${SPRING_REDIS_PASSWORD:}

auth.token-version.store=redis

clamav.enabled=false

jwt.secret=${JWT_SECRET:test-secret-not-real-must-be-long-enough-for-hmac}
hashids.salt=${HASHIDS_SALT:test-salt-not-real}

app.s3.bucket=${AWS_S3_BUCKET:reviewflow-test-bucket}
aws.region=${AWS_REGION:ca-central-1}
aws.s3.bucket=${AWS_S3_BUCKET:reviewflow-test-bucket}

mail.host=localhost
mail.port=1025
spring.mail.host=localhost
spring.mail.port=1025

springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

logging.level.root=WARN
logging.level.com.reviewflow=INFO
