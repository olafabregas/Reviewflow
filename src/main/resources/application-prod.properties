# ═══════════════════════════════════════════════════════════════════════════
# REVIEWFLOW PRODUCTION CONFIGURATION
# ═══════════════════════════════════════════════════════════════════════════
# This file contains production-ready defaults with maximum security enabled.
# All sensitive values MUST be provided via environment variables.
# DO NOT commit actual credentials to version control.
# ═══════════════════════════════════════════════════════════════════════════

# ───────────────────────────────────────────────────────────────────────────
# APPLICATION
# ───────────────────────────────────────────────────────────────────────────
spring.application.name=${APPLICATION_NAME}

# ───────────────────────────────────────────────────────────────────────────
# DATABASE (PostgreSQL)
# ───────────────────────────────────────────────────────────────────────────
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool settings (optimized for production)
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ───────────────────────────────────────────────────────────────────────────
# JPA / HIBERNATE
# ───────────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ───────────────────────────────────────────────────────────────────────────
# FLYWAY (Database Migration)
# ───────────────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true

# ───────────────────────────────────────────────────────────────────────────
# SERVER
# ───────────────────────────────────────────────────────────────────────────
server.port=${SERVER_PORT}
server.error.include-message=always
server.error.include-binding-errors=on_param
server.error.include-stacktrace=never
server.error.include-exception=false

# ───────────────────────────────────────────────────────────────────────────
# JWT CONFIGURATION
# ───────────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET}
jwt.access-token-expiration=${JWT_ACCESS_TOKEN_EXPIRATION}
jwt.refresh-token-expiration=${JWT_REFRESH_TOKEN_EXPIRATION}
jwt.cookie-name=${JWT_COOKIE_NAME:authToken}

# ───────────────────────────────────────────────────────────────────────────
# CORS CONFIGURATION
# ───────────────────────────────────────────────────────────────────────────
cors.allowed-origins=${CORS_ALLOWED_ORIGINS}
cors.allowed-methods=${CORS_ALLOWED_METHODS:GET,POST,PUT,DELETE,OPTIONS}
cors.allowed-headers=${CORS_ALLOWED_HEADERS:*}
cors.allow-credentials=${CORS_ALLOW_CREDENTIALS:true}
cors.max-age=${CORS_MAX_AGE:3600}

# ───────────────────────────────────────────────────────────────────────────
# COOKIE SECURITY (Production: Secure + Strict SameSite)
# ───────────────────────────────────────────────────────────────────────────
cookie.secure=true
cookie.http-only=true
cookie.same-site=Strict
cookie.max-age=${COOKIE_MAX_AGE:86400}
cookie.path=${COOKIE_PATH:/}

# ───────────────────────────────────────────────────────────────────────────
# FILE UPLOAD
# ───────────────────────────────────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:100MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:105MB}
storage.location=${STORAGE_LOCATION:./storage}

# ───────────────────────────────────────────────────────────────────────────
# FILE SECURITY VALIDATION
# ───────────────────────────────────────────────────────────────────────────
file.security.max-uncompressed-ratio=${FILE_SECURITY_MAX_UNCOMPRESSED_RATIO:100}
file.security.max-archive-entries=${FILE_SECURITY_MAX_ARCHIVE_ENTRIES:1000}

# ───────────────────────────────────────────────────────────────────────────
# RATE LIMITING (Security-hardened defaults)
# ───────────────────────────────────────────────────────────────────────────
rate-limiter.login.max-attempts=${RATE_LIMITER_LOGIN_MAX_ATTEMPTS:5}
rate-limiter.login.window-minutes=${RATE_LIMITER_LOGIN_WINDOW_MINUTES:15}
rate-limiter.token.max-attempts=${RATE_LIMITER_TOKEN_MAX_ATTEMPTS:20}
rate-limiter.token.window-seconds=${RATE_LIMITER_TOKEN_WINDOW_SECONDS:60}
rate-limiter.upload-block.max-attempts=${RATE_LIMITER_UPLOAD_BLOCK_MAX_ATTEMPTS:10}
rate-limiter.upload-block.window-minutes=${RATE_LIMITER_UPLOAD_BLOCK_WINDOW_MINUTES:60}

# ───────────────────────────────────────────────────────────────────────────
# PASSWORD POLICY
# ───────────────────────────────────────────────────────────────────────────
security.password.min-length=${SECURITY_PASSWORD_MIN_LENGTH:8}
security.password.max-length=${SECURITY_PASSWORD_MAX_LENGTH:64}
security.password.require-uppercase=${SECURITY_PASSWORD_REQUIRE_UPPERCASE:true}
security.password.require-lowercase=${SECURITY_PASSWORD_REQUIRE_LOWERCASE:true}
security.password.require-number=${SECURITY_PASSWORD_REQUIRE_NUMBER:true}
security.password.require-special=${SECURITY_PASSWORD_REQUIRE_SPECIAL:true}
security.password.allow-whitespace=${SECURITY_PASSWORD_ALLOW_WHITESPACE:false}

# ───────────────────────────────────────────────────────────────────────────
# CLAMAV MALWARE SCANNING (Enabled in Production)
# ───────────────────────────────────────────────────────────────────────────
clamav.enabled=true
clamav.host=${CLAMAV_HOST}
clamav.port=${CLAMAV_PORT:3310}
clamav.timeout=${CLAMAV_TIMEOUT:30000}

# ───────────────────────────────────────────────────────────────────────────
# TOKEN FINGERPRINTING (Enabled in Production)
# ───────────────────────────────────────────────────────────────────────────
token.fingerprinting-enabled=true

# ───────────────────────────────────────────────────────────────────────────
# ACTUATOR (Monitoring & Health Checks)
# ───────────────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,metrics,info
management.endpoint.health.show-details=when-authorized
management.metrics.export.simple.enabled=true

# ───────────────────────────────────────────────────────────────────────────
# LOGGING (Production: Minimal console output, use centralized logging)
# ───────────────────────────────────────────────────────────────────────────
logging.level.root=WARN
logging.level.com.reviewflow=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.flywaydb=INFO
