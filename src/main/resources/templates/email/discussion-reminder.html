<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <body
    th:replace="~{email/base :: layout(~{::section}, 'Discussion Reminder', true, ${preferencesUrl})}"
  >
    <section>
      <p>Hi <strong th:text="${recipientName}">there</strong>,</p>
      <p>
        <strong th:text="${discussionTitle}">Discussion</strong> is due soon. Post your
        response before the deadline.
      </p>
      <p>Due at: <strong th:text="${dueAt}">2026-01-01T00:00:00Z</strong></p>
      <p>
        <a
          th:href="${appBaseUrl + '/discussions/' + discussionHashId}"
          style="color: #2563eb; text-decoration: none"
          >Open discussion</a
        >
      </p>
    </section>
  </body>
</html>
