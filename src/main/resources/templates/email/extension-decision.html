<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body th:replace="~{email/base :: layout(~{::section}, 'Extension Decision', false, ${preferencesUrl})}">
<section>
    <p>Hi <strong th:text="${recipientName}">there</strong>,</p>
    <p>Your extension request for <strong th:text="${assignmentTitle}">Assignment</strong> was <strong th:text="${approved ? 'approved' : 'declined'}">decided</strong>.</p>
    <p th:if="${newDueAt != null}">New due date: <strong th:text="${newDueAt}">2026-01-01T00:00:00Z</strong></p>
    <p th:if="${instructorNote != null and !#strings.isEmpty(instructorNote)}" th:text="${instructorNote}">Instructor note</p>
    <p><a th:href="${appBaseUrl}" style="color:#2563eb;text-decoration:none;">Open ReviewFlow</a></p>
</section>
</body>
</html>
