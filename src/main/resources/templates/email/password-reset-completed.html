<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <body
    th:replace="~{email/base :: layout(~{::section}, 'Password changed', true, ${preferencesUrl})}"
  >
    <section>
      <p>Hi <strong th:text="${firstName}">there</strong>,</p>
      <p>Your ReviewFlow password was successfully changed.</p>
      <p>
        <a th:href="${appBaseUrl}" style="color: #2563eb; text-decoration: none">Sign in</a>
      </p>
    </section>
  </body>
</html>
